[build]
  command = "npm run build"
  functions = "functions"
  publish = "."
  ignore = "git diff --quiet HEAD^ HEAD ."

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# ============================================================
# HEADERS - Complete Security + Performance
# ============================================================

# HTML Pages
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Static Assets (CSS, JS, Images, Fonts)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Blog Pages (keep fresh for SEO)
[[headers]]
  for = "/blog/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Sitemap & Robots
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ============================================================
# REDIRECTS
# ============================================================

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# Non-www to www (or vice versa)
[[redirects]]
  from = "https://aitoolsnova.com/*"
  to = "https://www.aitoolsnova.com/:splat"
  status = 301
  force = true

# 404 Error Page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ============================================================
# FUNCTIONS
# ============================================================

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["axios", "groq-sdk"]
