<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Writer - AIToolsNova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* --- Same base styles as AI Chat --- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #4F46E5;
            --secondary: #06B6D4;
            --light: #F8FAFC;
            --border: #E2E8F0;
            --text: #0F172A;
            --text2: #64748B;
            --shadow: 0 12px 35px rgba(15, 23, 42, .08);
            --radius: 18px;
            --transition: .35s ease;
        }
        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }
        body {
            font-family: "Inter", sans-serif;
            background: var(--light);
            color: var(--text);
            line-height: 1.7;
        }
        .container {
            width: min(1200px, 92%);
            margin: auto;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
        }
        .header {
            position: sticky;
            top: 0;
            width: 100%;
            height: 72px;
            background: rgba(255, 255, 255, .92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 999;
            display: flex;
            align-items: center;
        }
        .header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 800;
        }
        .logo span {
            color: var(--primary);
        }
        .nav-links {
            display: flex;
            gap: 28px;
            font-weight: 600;
            color: var(--text2);
        }
        .nav-links a:hover {
            color: var(--primary);
        }
        .back-btn {
            padding: 10px 22px;
            border-radius: 50px;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            transition: var(--transition);
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 70, 229, .3);
        }
        .tool-hero {
            padding: 50px 0 30px;
            text-align: center;
        }
        .tool-hero h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            margin-bottom: 10px;
        }
        .tool-hero p {
            color: var(--text2);
            font-size: 1.1rem;
            max-width: 600px;
            margin: auto;
        }
        .tool-area {
            padding: 30px 0 70px;
        }
        .tool-box {
            max-width: 850px;
            margin: auto;
            background: #fff;
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .tool-box textarea,
        .tool-box input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            background: var(--light);
            resize: vertical;
        }
        .tool-box textarea:focus,
        .tool-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, .1);
        }
        .tool-box textarea {
            min-height: 140px;
        }
        .tool-box label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: var(--text);
        }
        .tool-box .row {
            margin-bottom: 20px;
        }
        .tool-btn {
            padding: 14px 34px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .tool-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(79, 70, 229, .35);
        }
        .tool-btn.secondary {
            background: var(--light);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .tool-btn.secondary:hover {
            background: var(--border);
        }
        .output-box {
            margin-top: 24px;
            padding: 20px;
            background: var(--light);
            border-radius: 14px;
            border: 1px solid var(--border);
            min-height: 80px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text);
            font-size: 0.95rem;
            line-height: 1.8;
            display: none;
        }
        .output-box.show {
            display: block;
            animation: fadeIn .3s ease;
        }
        .output-box .copy-btn {
            margin-top: 14px;
            padding: 8px 18px;
            border-radius: 30px;
            background: var(--primary);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .footer {
            background: #020617;
            padding: 50px 0 20px;
            color: #CBD5E1;
            text-align: center;
        }
        .footer a {
            color: #94A3B8;
            margin: 0 12px;
            font-size: 0.9rem;
        }
        .footer a:hover {
            color: #fff;
        }
        .footer p {
            color: #64748B;
            margin-top: 16px;
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .tool-box {
                padding: 24px 18px;
            }
            .tool-hero h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">🤖 <span>AITools</span>Nova</a>
            <nav class="nav-links">
                <a href="../index.html">Home</a>
                <a href="../tools.html">Tools</a>
                <a href="../blogs.html">Blogs</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </nav>
            <a href="../index.html#donate" class="back-btn">❤️ Donate</a>
        </div>
    </header>

    <section class="tool-hero">
        <div class="container">
            <h1>✍️ AI Writer</h1>
            <p>Generate blogs, articles, and content instantly with AI.</p>
        </div>
    </section>

    <section class="tool-area">
        <div class="container">
            <div class="tool-box">
                <div class="row">
                    <label for="topic">📌 Enter Topic or Keywords</label>
                    <input type="text" id="topic" placeholder="e.g. Benefits of remote work in 2026" />
                </div>
                <div class="row">
                    <label for="tone">🎭 Select Tone</label>
                    <select id="tone" style="width:100%;padding:14px 18px;border:2px solid var(--border);border-radius:14px;font-size:1rem;background:var(--light);font-family:inherit;">
                        <option value="professional">Professional</option>
                        <option value="casual">Casual / Friendly</option>
                        <option value="persuasive">Persuasive</option>
                        <option value="informative">Informative</option>
                        <option value="creative">Creative</option>
                    </select>
                </div>
                <div class="row">
                    <label for="wordCount">📏 Approximate Words</label>
                    <input type="number" id="wordCount" value="300" min="100" max="2000" style="width:100%;padding:14px 18px;border:2px solid var(--border);border-radius:14px;font-size:1rem;background:var(--light);font-family:inherit;" />
                </div>
                <div style="display:flex;gap:14px;flex-wrap:wrap;">
                    <button class="tool-btn" id="generateWriter">✨ Generate Content</button>
                    <button class="tool-btn secondary" id="clearWriter">🗑️ Clear</button>
                </div>
                <div class="output-box" id="outputBox">
                    <div id="outputContent">Your AI-generated content will appear here...</div>
                    <button class="copy-btn" id="copyBtn">📋 Copy</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <a href="../index.html">Home</a>
            <a href="../tools.html">Tools</a>
            <a href="../blogs.html">Blogs</a>
            <a href="../about.html">About</a>
            <a href="../contact.html">Contact</a>
            <a href="../privacy-policy.html">Privacy</a>
            <p>&copy; 2026 AIToolsNova. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const topicInput = document.getElementById('topic');
        const toneSelect = document.getElementById('tone');
        const wordCountInput = document.getElementById('wordCount');
        const generateBtn = document.getElementById('generateWriter');
        const clearBtn = document.getElementById('clearWriter');
        const outputBox = document.getElementById('outputBox');
        const outputContent = document.getElementById('outputContent');
        const copyBtn = document.getElementById('copyBtn');

        const contentTemplates = {
            professional: [
                "This article explores the topic in depth, providing actionable insights and professional recommendations. It covers key trends, challenges, and future opportunities.",
                "A comprehensive analysis reveals that strategic approaches yield the best outcomes. Industry experts agree that continuous innovation drives sustainable growth.",
                "The following insights are based on extensive research and real-world case studies. Organizations that adapt quickly gain a competitive advantage."
            ],
            casual: [
                "Hey there! Let's dive into this topic in a fun and easy-to-understand way. No jargon, just practical tips you can use today.",
                "So, here's the deal — this is something everyone should know about. It's simpler than you think, and I'll show you exactly how it works.",
                "Ready to learn something cool? I've broken down everything you need to know into bite-sized, actionable steps. Let's go!"
            ],
            persuasive: [
                "Imagine the possibilities — this is the one change that could transform your approach entirely. Don't wait, the time to act is now.",
                "Here's why this matters: studies show that those who embrace this approach see 3x better results. It's not just theory — it works.",
                "You deserve better results. This proven method has helped thousands achieve their goals. Are you ready to be next?"
            ],
            informative: [
                "According to recent data, this topic has gained significant traction. Key statistics highlight the growing importance of understanding these fundamentals.",
                "This guide provides a thorough overview of the subject, covering essential concepts, best practices, and common pitfalls to avoid.",
                "Research indicates that knowledge in this area correlates with improved outcomes. This article synthesizes the most relevant information."
            ],
            creative: [
                "In a world where everything moves fast, this topic stands out as a beacon of creativity and innovation. Let's explore it through a unique lens.",
                "Imagine a canvas where ideas blend and new possibilities emerge. This is the creative journey we're about to embark on together.",
                "Creativity meets strategy in this exploration. We'll challenge assumptions, ask bold questions, and discover unexpected answers."
            ]
        };

        function generateContent(topic, tone, words) {
            if (!topic.trim()) return "Please enter a topic first.";

            const templates = contentTemplates[tone] || contentTemplates.informative;
            const selected = templates[Math.floor(Math.random() * templates.length)];

            const intro = `📝 **${topic.trim()}**\n\n`;
            const body = selected + "\n\n" + selected.split(' ').slice(0, 3).join(' ') + " — this is a key takeaway. " +
                "Additionally, research supports the view that consistent effort yields measurable results over time. " +
                "The principles discussed here apply across various contexts and can be adapted to suit individual needs.";

            let finalText = intro + body;

            // Adjust word count roughly
            const currentWords = finalText.split(/\s+/).length;
            const targetWords = parseInt(words) || 300;
            if (currentWords < targetWords) {
                const extra = " " + selected.split(' ').slice(0, 10).join(' ') +
                    ". Furthermore, exploring this topic from multiple angles reveals deeper insights that can enhance your understanding and application. " +
                    "The journey of learning is ongoing, and each step brings new clarity.";
                finalText += extra;
            }

            return finalText;
        }

        generateBtn.addEventListener('click', function() {
            const topic = topicInput.value;
            const tone = toneSelect.value;
            const words = wordCountInput.value || 300;
            const result = generateContent(topic, tone, words);
            outputContent.textContent = result;
            outputBox.classList.add('show');
        });

        clearBtn.addEventListener('click', function() {
            topicInput.value = '';
            outputBox.classList.remove('show');
            outputContent.textContent = 'Your AI-generated content will appear here...';
        });

        copyBtn.addEventListener('click', function() {
            const text = outputContent.textContent;
            if (text && text !== 'Your AI-generated content will appear here...') {
                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
                });
            }
        });

        console.log('✍️ AI Writer loaded.');
    </script>
</body>
</html>
