<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat - AIToolsNova</title>
    <meta name="description" content="Free AI Chat assistant for daily work, writing, and brainstorming." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* --- RESET & VARIABLES --- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #4F46E5;
            --secondary: #06B6D4;
            --dark: #0F172A;
            --light: #F8FAFC;
            --border: #E2E8F0;
            --text: #0F172A;
            --text2: #64748B;
            --shadow: 0 12px 35px rgba(15, 23, 42, .08);
            --radius: 18px;
            --transition: .35s ease;
        }
        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }
        body {
            font-family: "Inter", sans-serif;
            background: var(--light);
            color: var(--text);
            line-height: 1.7;
        }
        .container {
            width: min(1200px, 92%);
            margin: auto;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
        }

        /* --- HEADER --- */
        .header {
            position: sticky;
            top: 0;
            width: 100%;
            height: 72px;
            background: rgba(255, 255, 255, .92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 999;
            display: flex;
            align-items: center;
        }
        .header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
        }
        .logo span {
            color: var(--primary);
        }
        .nav-links {
            display: flex;
            gap: 28px;
            font-weight: 600;
            color: var(--text2);
        }
        .nav-links a:hover {
            color: var(--primary);
        }
        .nav-links a.active {
            color: var(--primary);
        }
        .back-btn {
            padding: 10px 22px;
            border-radius: 50px;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            transition: var(--transition);
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 70, 229, .3);
        }

        /* --- TOOL HERO --- */
        .tool-hero {
            padding: 50px 0 30px;
            text-align: center;
        }
        .tool-hero h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            margin-bottom: 10px;
        }
        .tool-hero p {
            color: var(--text2);
            font-size: 1.1rem;
            max-width: 600px;
            margin: auto;
        }

        /* --- TOOL AREA --- */
        .tool-area {
            padding: 30px 0 70px;
        }
        .tool-box {
            max-width: 850px;
            margin: auto;
            background: #fff;
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .tool-box textarea,
        .tool-box input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            background: var(--light);
            resize: vertical;
        }
        .tool-box textarea:focus,
        .tool-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, .1);
        }
        .tool-box textarea {
            min-height: 140px;
        }
        .tool-box label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: var(--text);
        }
        .tool-box .row {
            margin-bottom: 20px;
        }
        .tool-btn {
            padding: 14px 34px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .tool-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(79, 70, 229, .35);
        }
        .tool-btn.secondary {
            background: var(--light);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .tool-btn.secondary:hover {
            background: var(--border);
            transform: translateY(-2px);
        }
        .output-box {
            margin-top: 24px;
            padding: 20px;
            background: var(--light);
            border-radius: 14px;
            border: 1px solid var(--border);
            min-height: 80px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text);
            font-size: 0.95rem;
            line-height: 1.8;
            display: none;
        }
        .output-box.show {
            display: block;
            animation: fadeIn .3s ease;
        }
        .output-box .copy-btn {
            margin-top: 14px;
            padding: 8px 18px;
            border-radius: 30px;
            background: var(--primary);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- FOOTER --- */
        .footer {
            background: #020617;
            padding: 50px 0 20px;
            color: #CBD5E1;
            text-align: center;
        }
        .footer a {
            color: #94A3B8;
            margin: 0 12px;
            font-size: 0.9rem;
        }
        .footer a:hover {
            color: #fff;
        }
        .footer p {
            color: #64748B;
            margin-top: 16px;
            font-size: 0.85rem;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .tool-box {
                padding: 24px 18px;
            }
            .tool-hero h1 {
                font-size: 1.6rem;
            }
            .header .container {
                flex-wrap: wrap;
                gap: 10px;
            }
            .back-btn {
                font-size: 0.85rem;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">🤖 <span>AITools</span>Nova</a>
            <nav class="nav-links">
                <a href="../index.html">Home</a>
                <a href="../tools.html">Tools</a>
                <a href="../blogs.html">Blogs</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </nav>
            <a href="../index.html#donate" class="back-btn">❤️ Donate</a>
        </div>
    </header>

    <!-- ===== TOOL HERO ===== -->
    <section class="tool-hero">
        <div class="container">
            <h1>🤖 AI Chat</h1>
            <p>Smart AI assistant for daily work, writing, brainstorming and more.</p>
        </div>
    </section>

    <!-- ===== TOOL AREA ===== -->
    <section class="tool-area">
        <div class="container">
            <div class="tool-box">
                <div class="row">
                    <label for="aiPrompt">💬 Enter your question or prompt</label>
                    <textarea id="aiPrompt" placeholder="e.g. Write a professional email for a job application..."></textarea>
                </div>
                <div style="display:flex;gap:14px;flex-wrap:wrap;">
                    <button class="tool-btn" id="generateBtn">✨ Generate Response</button>
                    <button class="tool-btn secondary" id="clearBtn">🗑️ Clear</button>
                </div>
                <div class="output-box" id="outputBox">
                    <div id="outputContent">Your AI response will appear here...</div>
                    <button class="copy-btn" id="copyBtn">📋 Copy</button>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <div>
                <a href="../index.html">Home</a>
                <a href="../tools.html">Tools</a>
                <a href="../blogs.html">Blogs</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
                <a href="../privacy-policy.html">Privacy</a>
            </div>
            <p>&copy; 2026 AIToolsNova. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // ===== AI CHAT LOGIC =====
        const promptInput = document.getElementById('aiPrompt');
        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const outputBox = document.getElementById('outputBox');
        const outputContent = document.getElementById('outputContent');
        const copyBtn = document.getElementById('copyBtn');

        // Sample AI responses (mock)
        const responses = [
            "That's a great question! Here's what I think: You should focus on breaking down your goal into smaller, actionable steps. Start with the most critical task and build momentum from there.",
            "I understand your concern. The best approach would be to research thoroughly, gather all necessary information, and then make a decision based on facts rather than assumptions.",
            "Here's a helpful suggestion: Try using the SMART framework — Specific, Measurable, Achievable, Relevant, and Time-bound. This will help you structure your plan effectively.",
            "From my analysis, the key is consistency. Even small daily efforts compound over time. Start with 15 minutes a day and gradually increase as you build the habit.",
            "Great idea! I'd recommend starting with a simple prototype or draft. Don't aim for perfection in the first version — iterate and improve based on feedback.",
            "Based on what you've shared, I think you're on the right track. The next step would be to connect with others who have similar goals and learn from their experiences.",
            "That's a thoughtful question. I believe the answer lies in balancing short-term needs with long-term vision. Don't compromise on your core values while pursuing quick wins."
        ];

        function getAIResponse(prompt) {
            if (!prompt.trim()) return "Please enter a question or prompt first.";
            // Simple mock: return a random response + echo the prompt
            const randomIdx = Math.floor(Math.random() * responses.length);
            return `🤖 AI Response:\n\n"${responses[randomIdx]}"\n\n📌 Your prompt: "${prompt.trim()}"\n\n💡 Tip: Be specific with your questions for better results.`;
        }

        generateBtn.addEventListener('click', function() {
            const prompt = promptInput.value;
            const result = getAIResponse(prompt);
            outputContent.textContent = result;
            outputBox.classList.add('show');
        });

        clearBtn.addEventListener('click', function() {
            promptInput.value = '';
            outputBox.classList.remove('show');
            outputContent.textContent = 'Your AI response will appear here...';
        });

        copyBtn.addEventListener('click', function() {
            const text = outputContent.textContent;
            if (text && text !== 'Your AI response will appear here...') {
                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
                }).catch(() => {
                    // Fallback
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
                });
            }
        });

        // Enter key to generate
        promptInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateBtn.click();
            }
        });

        console.log('🤖 AI Chat loaded successfully.');
    </script>
</body>
</html>
