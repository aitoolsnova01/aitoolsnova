<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger - AIToolsNova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#4F46E5;--secondary:#06B6D4;--light:#F8FAFC;--border:#E2E8F0;--text:#0F172A;--text2:#64748B;--shadow:0 12px 35px rgba(15,23,42,.08);--radius:18px;--transition:.35s ease}
        html{scroll-behavior:smooth;font-size:16px}
        body{font-family:"Inter",sans-serif;background:var(--light);color:var(--text);line-height:1.7}
        .container{width:min(1200px,92%);margin:auto}
        a{text-decoration:none;color:inherit}
        button{font-family:inherit;cursor:pointer;border:none}
        .header{position:sticky;top:0;width:100%;height:72px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:999;display:flex;align-items:center}
        .header .container{display:flex;align-items:center;justify-content:space-between}
        .logo{display:flex;align-items:center;gap:10px;font-size:1.3rem;font-weight:800}
        .logo span{color:var(--primary)}
        .nav-links{display:flex;gap:28px;font-weight:600;color:var(--text2)}
        .nav-links a:hover{color:var(--primary)}
        .back-btn{padding:10px 22px;border-radius:50px;background:var(--primary);color:#fff;font-weight:600;transition:var(--transition)}
        .back-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(79,70,229,.3)}
        .tool-hero{padding:50px 0 30px;text-align:center}
        .tool-hero h1{font-size:clamp(2rem,4vw,3rem);font-weight:800;margin-bottom:10px}
        .tool-hero p{color:var(--text2);font-size:1.1rem;max-width:600px;margin:auto}
        .tool-area{padding:30px 0 70px}
        .tool-box{max-width:850px;margin:auto;background:#fff;border-radius:var(--radius);padding:40px;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center}
        .drop-zone{border:3px dashed var(--border);border-radius:20px;padding:30px;cursor:pointer;transition:var(--transition);background:var(--light);margin-bottom:16px}
        .drop-zone:hover{border-color:var(--primary)}
        .drop-zone input{display:none}
        .file-list{margin:16px 0;text-align:left}
        .file-list .file-item{background:var(--light);padding:10px 16px;border-radius:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border)}
        .file-list .file-item span{font-weight:500}
        .file-list .file-item .remove{color:var(--danger);cursor:pointer;font-weight:700;font-size:1.2rem}
        .tool-btn{padding:14px 34px;border-radius:50px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;font-weight:700;font-size:1rem;transition:var(--transition);display:inline-flex;align-items:center;gap:10px;margin:6px}
        .tool-btn:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(79,70,229,.35)}
        .tool-btn.secondary{background:var(--light);color:var(--text);border:1px solid var(--border)}
        .tool-btn.secondary:hover{background:var(--border)}
        .output-box{margin-top:24px;padding:20px;background:var(--light);border-radius:14px;border:1px solid var(--border);min-height:60px;color:var(--text);font-size:0.95rem;display:none}
        .output-box.show{display:block;animation:fadeIn .3s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .footer{background:#020617;padding:50px 0 20px;color:#CBD5E1;text-align:center}
        .footer a{color:#94A3B8;margin:0 12px;font-size:0.9rem}
        .footer a:hover{color:#fff}
        .footer p{color:#64748B;margin-top:16px;font-size:0.85rem}
        @media(max-width:768px){.nav-links{display:none}.tool-box{padding:20px 16px}.tool-hero h1{font-size:1.6rem}}

     crossorigin="anonymous"></script>

</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">🤖 <span>AITools</span>Nova</a>
            <nav class="nav-links">
                <a href="../index.html">Home</a>
                <a href="../tools.html">Tools</a>
                <a href="../blogs.html">Blogs</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </nav>
            <a href="../index.html#donate" class="back-btn">❤️ Donate</a>
        </div>
    </header>

    <section class="tool-hero">
        <div class="container">
            <h1>🔗 PDF Merger</h1>
            <p>Merge multiple PDFs into one file.</p>
        </div>
    </section>

    <section class="tool-area">
        <div class="container">
            <div class="tool-box">
                <div class="drop-zone" id="dropZone">
                    <p style="font-size:2rem;">📂</p>
                    <p><strong>Click to upload</strong> PDF files</p>
                    <input type="file" id="fileInput" accept=".pdf" multiple>
                </div>
                <div class="file-list" id="fileList"></div>
                <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;">
                    <button class="tool-btn" id="mergeBtn">⬇️ Merge & Download</button>
                    <button class="tool-btn secondary" id="clearMerge">🗑️ Clear All</button>
                </div>
                <div class="output-box" id="outputBox">
                    <div id="outputContent"></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <a href="../index.html">Home</a><a href="../tools.html">Tools</a><a href="../blogs.html">Blogs</a><a href="../about.html">About</a><a href="../contact.html">Contact</a><a href="../privacy-policy.html">Privacy</a>
            <p>&copy; 2026 AIToolsNova. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const mergeBtn = document.getElementById('mergeBtn');
        const clearBtn = document.getElementById('clearMerge');
        const outputBox = document.getElementById('outputBox');
        const outputContent = document.getElementById('outputContent');
        let files = [];

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => e.preventDefault());
        dropZone.addEventListener('drop', e => { e.preventDefault(); if(e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', e => { if(e.target.files.length) addFiles(e.target.files); });

        function addFiles(newFiles) {
            for(let f of newFiles) {
                if(f.type === 'application/pdf' && !files.some(ex => ex.name === f.name && ex.size === f.size)) {
                    files.push(f);
                }
            }
            renderFileList();
        }

        function renderFileList() {
            if(!files.length) { fileList.innerHTML = ''; return; }
            let html = '';
            files.forEach((f, i) => {
                html += `<div class="file-item">
                    <span>📄 ${f.name} (${(f.size/1024).toFixed(1)} KB)</span>
                    <span class="remove" data-index="${i}">✕</span>
                </div>`;
            });
            fileList.innerHTML = html;
            document.querySelectorAll('.remove').forEach(el => {
                el.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    files.splice(idx, 1);
                    renderFileList();
                });
            });
        }

        mergeBtn.addEventListener('click', function() {
            if(files.length < 2) { alert('Please upload at least 2 PDFs to merge.'); return; }
            outputContent.innerHTML = `✅ Merging ${files.length} PDFs... (simulated)`;
            outputBox.classList.add('show');
            setTimeout(() => {
                alert(`✅ Merge complete! (Simulated) ${files.length} PDFs merged.`);
                outputContent.innerHTML += `<br>📥 Download would start for merged.pdf`;
            }, 1000);
        });

        clearBtn.addEventListener('click', function() {
            files = []; fileInput.value = ''; fileList.innerHTML = '';
            outputBox.classList.remove('show'); outputContent.innerHTML = '';
        });
        console.log('🔗 PDF Merger loaded.');
    </script>
</body>
</html>
