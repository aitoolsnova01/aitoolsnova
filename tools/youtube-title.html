<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Title Generator - AIToolsNova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#4F46E5;--secondary:#06B6D4;--light:#F8FAFC;--border:#E2E8F0;--text:#0F172A;--text2:#64748B;--shadow:0 12px 35px rgba(15,23,42,.08);--radius:18px;--transition:.35s ease}
        html{scroll-behavior:smooth;font-size:16px}
        body{font-family:"Inter",sans-serif;background:var(--light);color:var(--text);line-height:1.7}
        .container{width:min(1200px,92%);margin:auto}
        a{text-decoration:none;color:inherit}
        button{font-family:inherit;cursor:pointer;border:none}
        .header{position:sticky;top:0;width:100%;height:72px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:999;display:flex;align-items:center}
        .header .container{display:flex;align-items:center;justify-content:space-between}
        .logo{display:flex;align-items:center;gap:10px;font-size:1.3rem;font-weight:800}
        .logo span{color:var(--primary)}
        .nav-links{display:flex;gap:28px;font-weight:600;color:var(--text2)}
        .nav-links a:hover{color:var(--primary)}
        .back-btn{padding:10px 22px;border-radius:50px;background:var(--primary);color:#fff;font-weight:600;transition:var(--transition)}
        .back-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(79,70,229,.3)}
        .tool-hero{padding:50px 0 30px;text-align:center}
        .tool-hero h1{font-size:clamp(2rem,4vw,3rem);font-weight:800;margin-bottom:10px}
        .tool-hero p{color:var(--text2);font-size:1.1rem;max-width:600px;margin:auto}
        .tool-area{padding:30px 0 70px}
        .tool-box{max-width:850px;margin:auto;background:#fff;border-radius:var(--radius);padding:40px;box-shadow:var(--shadow);border:1px solid var(--border)}
        .tool-box input{width:100%;padding:14px 18px;border:2px solid var(--border);border-radius:14px;font-size:1rem;font-family:inherit;background:var(--light);margin-bottom:16px}
        .tool-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(79,70,229,.1)}
        .tool-box label{font-weight:600;display:block;margin-bottom:4px;color:var(--text);font-size:0.9rem}
        .tool-btn{padding:14px 34px;border-radius:50px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;font-weight:700;font-size:1rem;transition:var(--transition);display:inline-flex;align-items:center;gap:10px;margin:6px}
        .tool-btn:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(79,70,229,.35)}
        .tool-btn.secondary{background:var(--light);color:var(--text);border:1px solid var(--border)}
        .tool-btn.secondary:hover{background:var(--border)}
        .output-box{margin-top:24px;padding:20px;background:var(--light);border-radius:14px;border:1px solid var(--border);min-height:80px;white-space:pre-wrap;word-wrap:break-word;color:var(--text);font-size:0.95rem;line-height:1.8;display:none}
        .output-box.show{display:block;animation:fadeIn .3s ease}
        .copy-btn{margin-top:14px;padding:8px 18px;border-radius:30px;background:var(--primary);color:#fff;font-size:0.85rem;font-weight:600}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .footer{background:#020617;padding:50px 0 20px;color:#CBD5E1;text-align:center}
        .footer a{color:#94A3B8;margin:0 12px;font-size:0.9rem}
        .footer a:hover{color:#fff}
        .footer p{color:#64748B;margin-top:16px;font-size:0.85rem}
        @media(max-width:768px){.nav-links{display:none}.tool-box{padding:20px 16px}.tool-hero h1{font-size:1.6rem}}

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2278101269918728"
     crossorigin="anonymous"></script>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-KJ0WTD0R0M"></script>

  window.dataLayer = window.dataLayer || [];

  function gtag() {
    dataLayer.push(arguments);
  }

  gtag('js', new Date());

  gtag('config', 'G-KJ0WTD0R0M', {

    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">🤖 <span>AITools</span>Nova</a>
            <nav class="nav-links">
                <a href="../index.html">Home</a>
                <a href="../tools.html">Tools</a>
                <a href="../blogs.html">Blogs</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </nav>
            <a href="../index.html#donate" class="back-btn">❤️ Donate</a>
        </div>
    </header>

    <section class="tool-hero">
        <div class="container">
            <h1>▶️ YouTube Title Generator</h1>
            <p>Create click-worthy YouTube titles for your videos.</p>
        </div>
    </section>

    <section class="tool-area">
        <div class="container">
            <div class="tool-box">
                <label for="topicYt">Video Topic</label>
                <input type="text" id="topicYt" placeholder="e.g. How to build a website">
                <div style="display:flex;flex-wrap:wrap;gap:10px;">
                    <button class="tool-btn" id="generateYtTitle">🎬 Generate Titles</button>
                    <button class="tool-btn secondary" id="clearYtTitle">🗑️ Clear</button>
                </div>
                <div class="output-box" id="outputBox">
                    <div id="outputContent"></div>
                    <button class="copy-btn" id="copyBtn">📋 Copy</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <a href="../index.html">Home</a><a href="../tools.html">Tools</a><a href="../blogs.html">Blogs</a><a href="../about.html">About</a><a href="../contact.html">Contact</a><a href="../privacy-policy.html">Privacy</a>
            <p>&copy; 2026 AIToolsNova. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const topicYt = document.getElementById('topicYt');
        const generateBtn = document.getElementById('generateYtTitle');
        const clearBtn = document.getElementById('clearYtTitle');
        const outputBox = document.getElementById('outputBox');
        const outputContent = document.getElementById('outputContent');
        const copyBtn = document.getElementById('copyBtn');

        const titleTemplates = [
            (t) => `How to ${t} (Step-by-Step Guide)`,
            (t) => `${t} — Complete Tutorial for Beginners`,
            (t) => `The Ultimate Guide to ${t}`,
            (t) => `${t} in 2026: Everything You Need to Know`,
            (t) => `${t} — Tips & Tricks You Didn't Know`,
            (t) => `${t} Made Easy (No Experience Required)`,
            (t) => `${t} — Full Walkthrough`,
            (t) => `5 Secrets About ${t} You Should Know`,
            (t) => `${t} — The Right Way`,
            (t) => `Why ${t} is the Future`,
            (t) => `How I Mastered ${t} (And You Can Too)`,
            (t) => `${t} — From Zero to Hero`
        ];

        generateBtn.addEventListener('click', function() {
            const topic = topicYt.value.trim();
            if(!topic) { alert('Please enter a video topic.'); return; }
            const titles = titleTemplates.map(fn => fn(topic));
            outputContent.textContent = titles.join('\n\n');
            outputBox.classList.add('show');
        });

        clearBtn.addEventListener('click', function() {
            topicYt.value = '';
            outputBox.classList.remove('show');
            outputContent.textContent = '';
        });

        copyBtn.addEventListener('click', function() {
            const text = outputContent.textContent;
            if(text) {
                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
                }).catch(() => {
                    const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
                    copyBtn.textContent = '✅ Copied!'; setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
                });
            }
        });
        console.log('▶️ YouTube Title Generator loaded.');
    </script>
</body>
</html>
