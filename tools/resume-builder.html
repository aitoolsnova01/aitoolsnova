<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Builder - AIToolsNova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* --- Same base styles as above, plus resume-specific --- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #4F46E5;
            --secondary: #06B6D4;
            --light: #F8FAFC;
            --border: #E2E8F0;
            --text: #0F172A;
            --text2: #64748B;
            --shadow: 0 12px 35px rgba(15, 23, 42, .08);
            --radius: 18px;
            --transition: .35s ease;
        }
        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }
        body {
            font-family: "Inter", sans-serif;
            background: var(--light);
            color: var(--text);
            line-height: 1.7;
        }
        .container {
            width: min(1200px, 92%);
            margin: auto;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
        }

        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            width: 100%;
            height: 72px;
            background: rgba(255, 255, 255, .92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 999;
            display: flex;
            align-items: center;
        }
        .header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 800;
        }
        .logo span {
            color: var(--primary);
        }
        .nav-links {
            display: flex;
            gap: 28px;
            font-weight: 600;
            color: var(--text2);
        }
        .nav-links a:hover {
            color: var(--primary);
        }
        .back-btn {
            padding: 10px 22px;
            border-radius: 50px;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            transition: var(--transition);
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 70, 229, .3);
        }

        /* TOOL HERO */
        .tool-hero {
            padding: 50px 0 30px;
            text-align: center;
        }
        .tool-hero h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            margin-bottom: 10px;
        }
        .tool-hero p {
            color: var(--text2);
            font-size: 1.1rem;
            max-width: 600px;
            margin: auto;
        }

        /* TOOL AREA */
        .tool-area {
            padding: 30px 0 70px;
        }
        .tool-box {
            max-width: 900px;
            margin: auto;
            background: #fff;
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-grid .full {
            grid-column: 1 / -1;
        }
        .tool-box label {
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
            font-size: 0.9rem;
            color: var(--text);
        }
        .tool-box input,
        .tool-box textarea,
        .tool-box select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
            background: var(--light);
        }
        .tool-box input:focus,
        .tool-box textarea:focus,
        .tool-box select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, .1);
        }
        .tool-box textarea {
            min-height: 80px;
            resize: vertical;
        }
        .tool-btn {
            padding: 14px 34px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .tool-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(79, 70, 229, .35);
        }
        .tool-btn.secondary {
            background: var(--light);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .tool-btn.secondary:hover {
            background: var(--border);
        }
        .btn-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .resume-preview {
            margin-top: 30px;
            padding: 30px;
            background: var(--light);
            border-radius: 14px;
            border: 1px solid var(--border);
            display: none;
            white-space: pre-wrap;
            font-family: inherit;
            line-height: 1.8;
            font-size: 0.95rem;
        }
        .resume-preview.show {
            display: block;
            animation: fadeIn .3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .copy-btn {
            margin-top: 14px;
            padding: 8px 18px;
            border-radius: 30px;
            background: var(--primary);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* FOOTER */
        .footer {
            background: #020617;
            padding: 50px 0 20px;
            color: #CBD5E1;
            text-align: center;
        }
        .footer a {
            color: #94A3B8;
            margin: 0 12px;
            font-size: 0.9rem;
        }
        .footer a:hover {
            color: #fff;
        }
        .footer p {
            color: #64748B;
            margin-top: 16px;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .tool-box {
                padding: 20px 16px;
            }
            .tool-hero h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">🤖 <span>AITools</span>Nova</a>
            <nav class="nav-links">
                <a href="../index.html">Home</a>
                <a href="../tools.html">Tools</a>
                <a href="../blogs.html">Blogs</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </nav>
            <a href="../index.html#donate" class="back-btn">❤️ Donate</a>
        </div>
    </header>

    <section class="tool-hero">
        <div class="container">
            <h1>📝 Resume Builder</h1>
            <p>Create professional ATS-friendly resumes in minutes.</p>
        </div>
    </section>

    <section class="tool-area">
        <div class="container">
            <div class="tool-box">
                <div class="form-grid">
                    <div class="full">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="e.g. John Doe" />
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="john@example.com" />
                    </div>
                    <div>
                        <label for="phone">Phone</label>
                        <input type="text" id="phone" placeholder="+91 98765 43210" />
                    </div>
                    <div class="full">
                        <label for="summary">Professional Summary</label>
                        <textarea id="summary" placeholder="Brief summary of your experience and skills..."></textarea>
                    </div>
                    <div class="full">
                        <label for="experience">Work Experience</label>
                        <textarea id="experience" placeholder="e.g. Software Engineer at XYZ (2020-2024)&#10;- Developed web applications&#10;- Led a team of 5 developers"></textarea>
                    </div>
                    <div class="full">
                        <label for="education">Education</label>
                        <textarea id="education" placeholder="e.g. B.Tech in Computer Science, ABC University (2016-2020)"></textarea>
                    </div>
                    <div class="full">
                        <label for="skills">Skills</label>
                        <textarea id="skills" placeholder="e.g. JavaScript, React, Python, AWS, Docker"></textarea>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="tool-btn" id="generateResume">📄 Generate Resume</button>
                    <button class="tool-btn secondary" id="clearResume">🗑️ Clear</button>
                </div>
                <div class="resume-preview" id="resumePreview">
                    <div id="resumeContent"></div>
                    <button class="copy-btn" id="copyResume">📋 Copy Resume</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <a href="../index.html">Home</a>
            <a href="../tools.html">Tools</a>
            <a href="../blogs.html">Blogs</a>
            <a href="../about.html">About</a>
            <a href="../contact.html">Contact</a>
            <a href="../privacy-policy.html">Privacy</a>
            <p>&copy; 2026 AIToolsNova. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const generateBtn = document.getElementById('generateResume');
        const clearBtn = document.getElementById('clearResume');
        const preview = document.getElementById('resumePreview');
        const content = document.getElementById('resumeContent');
        const copyBtn = document.getElementById('copyResume');

        function buildResume() {
            const name = document.getElementById('fullName').value.trim() || 'Full Name';
            const email = document.getElementById('email').value.trim() || 'email@example.com';
            const phone = document.getElementById('phone').value.trim() || 'Phone Number';
            const summary = document.getElementById('summary').value.trim() || 'Professional summary goes here.';
            const experience = document.getElementById('experience').value.trim() || 'Work experience details.';
            const education = document.getElementById('education').value.trim() || 'Education details.';
            const skills = document.getElementById('skills').value.trim() || 'Skills listed here.';

            return `
        ========================================
                    ${name.toUpperCase()}
        ========================================
        ${email}  |  ${phone}

        📌 PROFESSIONAL SUMMARY
        ${summary}

        💼 WORK EXPERIENCE
        ${experience}

        🎓 EDUCATION
        ${education}

        🛠️ SKILLS
        ${skills}

        ========================================
        Resume generated by AIToolsNova
        ========================================
            `;
        }

        generateBtn.addEventListener('click', function() {
            const resumeText = buildResume();
            content.textContent = resumeText;
            preview.classList.add('show');
        });

        clearBtn.addEventListener('click', function() {
            document.querySelectorAll('.tool-box input, .tool-box textarea').forEach(el => el.value = '');
            preview.classList.remove('show');
            content.textContent = '';
        });

        copyBtn.addEventListener('click', function() {
            const text = content.textContent;
            if (text) {
                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => copyBtn.textContent = '📋 Copy Resume', 2000);
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => copyBtn.textContent = '📋 Copy Resume', 2000);
                });
            }
        });

        console.log('📝 Resume Builder loaded.');
    </script>
</body>
</html>
