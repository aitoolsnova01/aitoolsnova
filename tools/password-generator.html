<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - AIToolsNova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#4F46E5;--secondary:#06B6D4;--light:#F8FAFC;--border:#E2E8F0;--text:#0F172A;--text2:#64748B;--shadow:0 12px 35px rgba(15,23,42,.08);--radius:18px;--transition:.35s ease}
        html{scroll-behavior:smooth;font-size:16px}
        body{font-family:"Inter",sans-serif;background:var(--light);color:var(--text);line-height:1.7}
        .container{width:min(1200px,92%);margin:auto}
        a{text-decoration:none;color:inherit}
        button{font-family:inherit;cursor:pointer;border:none}
        .header{position:sticky;top:0;width:100%;height:72px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:999;display:flex;align-items:center}
        .header .container{display:flex;align-items:center;justify-content:space-between}
        .logo{display:flex;align-items:center;gap:10px;font-size:1.3rem;font-weight:800}
        .logo span{color:var(--primary)}
        .nav-links{display:flex;gap:28px;font-weight:600;color:var(--text2)}
        .nav-links a:hover{color:var(--primary)}
        .back-btn{padding:10px 22px;border-radius:50px;background:var(--primary);color:#fff;font-weight:600;transition:var(--transition)}
        .back-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(79,70,229,.3)}
        .tool-hero{padding:50px 0 30px;text-align:center}
        .tool-hero h1{font-size:clamp(2rem,4vw,3rem);font-weight:800;margin-bottom:10px}
        .tool-hero p{color:var(--text2);font-size:1.1rem;max-width:600px;margin:auto}
        .tool-area{padding:30px 0 70px}
        .tool-box{max-width:850px;margin:auto;background:#fff;border-radius:var(--radius);padding:40px;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center}
        .tool-box label{font-weight:600;display:block;margin-bottom:4px;color:var(--text);font-size:0.9rem;text-align:left}
        .tool-box input[type="number"]{width:100px;padding:10px;border:2px solid var(--border);border-radius:14px;font-size:1rem;text-align:center;display:inline-block;margin:10px auto}
        .tool-box .checkbox-group{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin:16px 0}
        .tool-box .checkbox-group label{font-weight:400;display:flex;align-items:center;gap:8px}
        .password-output{background:var(--light);padding:20px;border-radius:14px;border:1px solid var(--border);font-size:1.2rem;font-weight:600;letter-spacing:1px;word-break:break-all;margin:16px 0;display:none}
        .password-output.show{display:block;animation:fadeIn .3s ease}
        .tool-btn{padding:14px 34px;border-radius:50px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;font-weight:700;font-size:1rem;transition:var(--transition);display:inline-flex;align-items:center;gap:10px;margin:6px}
        .tool-btn:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(79,70,229,.35)}
        .tool-btn.secondary{background:var(--light);color:var(--text);border:1px solid var(--border)}
        .tool-btn.secondary:hover{background:var(--border)}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .footer{background:#020617;padding:50px 0 20px;color:#CBD5E1;text-align:center}
        .footer a{color:#94A3B8;margin:0 12px;font-size:0.9rem}
        .footer a:hover{color:#fff}
        .footer p{color:#64748B;margin-top:16px;font-size:0.85rem}
        @media(max-width:768px){.nav-links{display:none}.tool-box{padding:20px 16px}.tool-hero h1{font-size:1.6rem}}
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">🤖 <span>AITools</span>Nova</a>
            <nav class="nav-links">
                <a href="../index.html">Home</a>
                <a href="../tools.html">Tools</a>
                <a href="../blogs.html">Blogs</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </nav>
            <a href="../index.html#donate" class="back-btn">❤️ Donate</a>
        </div>
    </header>

    <section class="tool-hero">
        <div class="container">
            <h1>🔐 Password Generator</h1>
            <p>Generate strong, secure passwords instantly.</p>
        </div>
    </section>

    <section class="tool-area">
        <div class="container">
            <div class="tool-box">
                <label for="length">Password Length</label>
                <input type="number" id="length" value="16" min="6" max="64">
                <div class="checkbox-group">
                    <label><input type="checkbox" id="useUpper" checked> Uppercase</label>
                    <label><input type="checkbox" id="useLower" checked> Lowercase</label>
                    <label><input type="checkbox" id="useNumbers" checked> Numbers</label>
                    <label><input type="checkbox" id="useSymbols" checked> Symbols</label>
                </div>
                <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;">
                    <button class="tool-btn" id="generatePass">🔑 Generate</button>
                    <button class="tool-btn secondary" id="copyPass">📋 Copy</button>
                    <button class="tool-btn secondary" id="clearPass">🗑️ Clear</button>
                </div>
                <div class="password-output" id="passwordOutput">
                    <span id="passwordText"></span>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <a href="../index.html">Home</a><a href="../tools.html">Tools</a><a href="../blogs.html">Blogs</a><a href="../about.html">About</a><a href="../contact.html">Contact</a><a href="../privacy-policy.html">Privacy</a>
            <p>&copy; 2026 AIToolsNova. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const lengthInput = document.getElementById('length');
        const useUpper = document.getElementById('useUpper');
        const useLower = document.getElementById('useLower');
        const useNumbers = document.getElementById('useNumbers');
        const useSymbols = document.getElementById('useSymbols');
        const generateBtn = document.getElementById('generatePass');
        const copyBtn = document.getElementById('copyPass');
        const clearBtn = document.getElementById('clearPass');
        const output = document.getElementById('passwordOutput');
        const passwordText = document.getElementById('passwordText');

        function generatePassword() {
            const len = parseInt(lengthInput.value) || 16;
            const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lower = 'abcdefghijklmnopqrstuvwxyz';
            const numbers = '0123456789';
            const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
            let chars = '';
            if(useUpper.checked) chars += upper;
            if(useLower.checked) chars += lower;
            if(useNumbers.checked) chars += numbers;
            if(useSymbols.checked) chars += symbols;
            if(!chars) { alert('Select at least one character type.'); return ''; }
            let password = '';
            for(let i=0; i<len; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return password;
        }

        generateBtn.addEventListener('click', function() {
            const pass = generatePassword();
            if(pass) {
                passwordText.textContent = pass;
                output.classList.add('show');
            }
        });

        copyBtn.addEventListener('click', function() {
            const pass = passwordText.textContent;
            if(!pass) { alert('Generate a password first.'); return; }
            navigator.clipboard.writeText(pass).then(() => {
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
            }).catch(() => {
                const ta = document.createElement('textarea'); ta.value = pass; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
            });
        });

        clearBtn.addEventListener('click', function() {
            passwordText.textContent = '';
            output.classList.remove('show');
        });
        console.log('🔐 Password Generator loaded.');
    </script>
</body>
</html>
