name: AI Daily Blog Generator

on:
  workflow_dispatch:

  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate Blog
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npm run blog

      - name: Commit Changes
        run: |
          git config --global user.name "AIToolsNova Bot"
          git config --global user.email "actions@github.com"

          git add .

          git diff --cached --quiet || git commit -m "🤖 Auto AI Blog"

      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
