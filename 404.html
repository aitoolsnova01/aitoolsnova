<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | AIToolsNova</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="canonical" href="https://www.aitoolsnova.com/">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#f8fafc;color:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
        .container{max-width:600px}
        h1{font-size:6rem;font-weight:900;background:linear-gradient(135deg,#4F46E5,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
        h2{font-size:1.8rem;margin:16px 0 8px}
        p{color:#64748b;margin-bottom:24px}
        a{display:inline-block;padding:14px 32px;border-radius:50px;background:linear-gradient(135deg,#4F46E5,#06B6D4);color:#fff;font-weight:700;text-decoration:none;transition:.3s}
        a:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(79,70,229,.35)}
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="/">🏠 Back to Home</a>
    </div>
</body>
</html>
